repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        # The only real code in this repo — a bash CI runner.
        # shellcheck warns about quoting, set -u, and other shell gotchas.
        files: ^scripts/.*\.sh$
