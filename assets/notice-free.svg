<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" width="1200" height="180" role="img" aria-label="Notice — free web work">
  <defs>
    <pattern id="notice-haz" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="20" height="40" fill="#e8b923"/>
      <rect x="20" width="20" height="40" fill="#0a0a0a"/>
    </pattern>
    <pattern id="notice-grain" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#1a1a1a"/>
      <circle cx="13" cy="22" r="0.4" fill="#262626"/>
      <circle cx="54" cy="11" r="0.5" fill="#262626"/>
      <circle cx="38" cy="61" r="0.3" fill="#262626"/>
      <circle cx="69" cy="48" r="0.4" fill="#262626"/>
      <circle cx="22" cy="68" r="0.4" fill="#262626"/>
    </pattern>
  </defs>

  <rect width="1200" height="180" fill="url(#notice-grain)"/>

  <!-- hazard rails -->
  <rect x="0" y="0" width="1200" height="10" fill="url(#notice-haz)"/>
  <rect x="0" y="170" width="1200" height="10" fill="url(#notice-haz)"/>

  <!-- left triangle warning -->
  <g transform="translate(80 90)">
    <polygon points="0,-44 44,32 -44,32" fill="#e8b923" stroke="#0a0a0a" stroke-width="3"/>
    <text x="0" y="22" font-family="'Courier New', monospace" font-size="48" font-weight="700" fill="#0a0a0a" text-anchor="middle">!</text>
  </g>

  <!-- text block -->
  <g font-family="'Courier New', monospace">
    <text x="170" y="68" font-size="24" font-weight="700" fill="#f0eada" letter-spacing="4">NOTICE · WEB WORK IS FREE</text>
    <text x="170" y="100" font-size="13" fill="#b8b0a0" letter-spacing="1">If you need a proper website — not a template, something actually built —</text>
    <text x="170" y="120" font-size="13" fill="#b8b0a0" letter-spacing="1">I'll do it for free. The point isn't the money. It's the experience and the relationship.</text>
    <text x="170" y="140" font-size="13" fill="#b8b0a0" letter-spacing="1">What you want is what you should get. Reach out here on GitHub.</text>
  </g>

  <!-- right stamp -->
  <g transform="translate(1100 90)">
    <rect x="-70" y="-32" width="140" height="64" fill="none" stroke="#c8341f" stroke-width="2" transform="rotate(-6)"/>
    <text x="0" y="-2" font-family="'Courier New', monospace" font-size="14" font-weight="700" fill="#c8341f" text-anchor="middle" letter-spacing="3" transform="rotate(-6)">NO INVOICE</text>
    <text x="0" y="18" font-family="'Courier New', monospace" font-size="10" fill="#c8341f" text-anchor="middle" letter-spacing="2" transform="rotate(-6)">SERIOUSLY</text>
  </g>
</svg>
