<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 280" width="380" height="280" role="img" aria-label="Lane — Web &amp; Local-First">
  <defs>
    <pattern id="lane1-grain" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="#1a1a1a"/>
      <circle cx="8" cy="14" r="0.4" fill="#252525"/>
      <circle cx="42" cy="22" r="0.5" fill="#252525"/>
      <circle cx="28" cy="44" r="0.3" fill="#252525"/>
      <circle cx="51" cy="52" r="0.4" fill="#252525"/>
    </pattern>
  </defs>

  <!-- shadow -->
  <rect x="14" y="18" width="360" height="260" fill="#000" opacity="0.5"/>
  <!-- plate -->
  <rect x="6" y="10" width="360" height="260" fill="url(#lane1-grain)" stroke="#3a3a3a" stroke-width="1"/>

  <!-- header bar -->
  <rect x="6" y="10" width="360" height="44" fill="#c8341f"/>
  <!-- chevrons in header -->
  <g fill="#0a0a0a">
    <polygon points="14,18 22,18 18,32 26,32 22,46 14,46 18,32 10,32"/>
    <polygon points="350,18 358,18 354,32 362,32 358,46 350,46 354,32 346,32"/>
  </g>
  <text x="186" y="40" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#f0eada" text-anchor="middle" letter-spacing="6">WEB · LOCAL</text>

  <!-- rivets -->
  <g fill="#2a2a2a">
    <circle cx="16" cy="20" r="2"/><circle cx="356" cy="20" r="2"/>
    <circle cx="16" cy="44" r="2"/><circle cx="356" cy="44" r="2"/>
    <circle cx="16" cy="260" r="2"/><circle cx="356" cy="260" r="2"/>
  </g>

  <!-- big stencil number/icon area -->
  <g transform="translate(186 130)">
    <!-- monitor/window glyph -->
    <rect x="-60" y="-40" width="120" height="80" fill="none" stroke="#e8b923" stroke-width="3"/>
    <line x1="-60" y1="-24" x2="60" y2="-24" stroke="#e8b923" stroke-width="2"/>
    <circle cx="-52" cy="-32" r="2" fill="#e8b923"/>
    <circle cx="-44" cy="-32" r="2" fill="#e8b923"/>
    <circle cx="-36" cy="-32" r="2" fill="#e8b923"/>
    <text x="0" y="14" font-family="'Courier New', monospace" font-size="22" font-weight="700" fill="#e8b923" text-anchor="middle">&lt;/&gt;</text>
  </g>

  <!-- body text -->
  <g font-family="'Courier New', monospace" fill="#b8b0a0">
    <text x="20" y="218" font-size="12" letter-spacing="2">PWAs · LOCAL-FIRST APPS</text>
    <text x="20" y="236" font-size="12" letter-spacing="2">CLIENT WEB BUILDS</text>
    <text x="20" y="254" font-size="12" letter-spacing="2">DASHBOARDS &amp; INTERFACES</text>
  </g>
</svg>
