<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 280" width="380" height="280" role="img" aria-label="Lane — Bots, Assistants & Control Surfaces">
  <defs>
    <pattern id="lane2-grain" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="#1a1a1a"/>
      <circle cx="11" cy="9" r="0.4" fill="#252525"/>
      <circle cx="37" cy="29" r="0.5" fill="#252525"/>
      <circle cx="22" cy="48" r="0.3" fill="#252525"/>
      <circle cx="48" cy="14" r="0.4" fill="#252525"/>
    </pattern>
  </defs>

  <rect x="14" y="18" width="360" height="260" fill="#000" opacity="0.5"/>
  <rect x="6" y="10" width="360" height="260" fill="url(#lane2-grain)" stroke="#3a3a3a" stroke-width="1"/>

  <rect x="6" y="10" width="360" height="44" fill="#e8b923"/>
  <g fill="#0a0a0a">
    <polygon points="14,18 22,18 18,32 26,32 22,46 14,46 18,32 10,32"/>
    <polygon points="350,18 358,18 354,32 362,32 358,46 350,46 354,32 346,32"/>
  </g>
  <text x="186" y="40" font-family="'Courier New', monospace" font-size="20" font-weight="700" fill="#0a0a0a" text-anchor="middle" letter-spacing="6">BOTS · ASSISTANTS</text>

  <g fill="#2a2a2a">
    <circle cx="16" cy="20" r="2"/><circle cx="356" cy="20" r="2"/>
    <circle cx="16" cy="44" r="2"/><circle cx="356" cy="44" r="2"/>
    <circle cx="16" cy="260" r="2"/><circle cx="356" cy="260" r="2"/>
  </g>

  <!-- bot/gear glyph -->
  <g transform="translate(186 130)" stroke="#e8b923" stroke-width="3" fill="none">
    <!-- bot head -->
    <rect x="-44" y="-36" width="88" height="64" rx="6"/>
    <!-- antenna -->
    <line x1="0" y1="-36" x2="0" y2="-52"/>
    <circle cx="0" cy="-54" r="3" fill="#e8b923"/>
    <!-- eyes -->
    <circle cx="-20" cy="-8" r="6" fill="#e8b923"/>
    <circle cx="20" cy="-8" r="6" fill="#e8b923"/>
    <!-- mouth grid -->
    <line x1="-20" y1="14" x2="20" y2="14"/>
  </g>

  <g font-family="'Courier New', monospace" fill="#b8b0a0">
    <text x="20" y="218" font-size="12" letter-spacing="2">DISCORD · TELEGRAM BOTS</text>
    <text x="20" y="236" font-size="12" letter-spacing="2">LLM CONTROL SURFACES</text>
    <text x="20" y="254" font-size="12" letter-spacing="2">MCP · ASSISTANT RUNTIMES</text>
  </g>
</svg>
