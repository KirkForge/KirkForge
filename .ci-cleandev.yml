# ci-cleandev configuration — flat key=value format
#
# The loader in scripts/ci.sh (load_config) reads ONLY these keys:
#   mode                normal | fast     (fast = skip slow steps: audit,
#                                          docker build, actionlint, trufflehog)
#   timeout             integer seconds, per-step (default 180)
#   require_trufflehog  0 | 1             (1 = fail if trufflehog is missing,
#                                          regardless of gitleaks presence)
#
# Comments (#) and blank lines are ignored. Surrounding whitespace around
# keys, values, and the = is fine — e.g. `mode = fast` works.
#
# Example:
#   mode = fast
#   timeout = 240
#   require_trufflehog = 1
